version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: crisisguard-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - crisisguard-network

  redis:
    image: redis:alpine
    container_name: crisisguard-redis
    ports:
      - "6379:6379"
    networks:
      - crisisguard-network

  ai-service:
    build: ./ai-service
    container_name: crisisguard-ai
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service:/app
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - crisisguard-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  backend:
    build: ./backend
    container_name: crisisguard-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
      - ai-service
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/crisisguard
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:8000
      - JWT_SECRET=crisisguard_ai_secret_key_2026
      - NEWS_API_KEY=${NEWS_API_KEY}
      - PORT=5000
      - NODE_ENV=development
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - crisisguard-network
    command: npm run dev

  frontend:
    image: node:20-alpine
    container_name: crisisguard-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
      - VITE_NEWS_API_KEY=${VITE_NEWS_API_KEY}
      - VITE_GNEWS_API_KEY=${VITE_GNEWS_API_KEY}
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - crisisguard-network
    command: sh -c "npm install && npm run dev -- --host"

networks:
  crisisguard-network:
    driver: bridge

volumes:
  mongodb_data:
